    - data:
        code: "def main(city, response_body):\n    import json\n    try:\n       \
          \ data = json.loads(response_body)\n        current = data[\"current_condition\"\
          ][0]\n        area = data[\"nearest_area\"][0]\n        desc_list = current.get(\"\
          weatherDesc\", [{}])\n        desc = desc_list[0].get(\"value\", \"Unknown\"\
          )\n        result = {\n            \"city\": city,\n            \"resolved_name\"\
          : area[\"areaName\"][0][\"value\"],\n            \"country\": area[\"country\"\
          ][0][\"value\"],\n            \"status\": \"success\",\n            \"data\"\
          : {\n                \"temp_C\": int(current.get(\"temp_C\", \"0\")),\n\
          \                \"feels_like_C\": int(current.get(\"FeelsLikeC\", \"0\"\
          )),\n                \"humidity\": int(current.get(\"humidity\", \"0\")),\n\
          \                \"weatherDesc\": desc,\n                \"windspeedKmph\"\
          : int(current.get(\"windspeedKmph\", \"0\")),\n                \"precipMM\"\
          : float(current.get(\"precipMM\", \"0.0\")),\n                \"visibility\"\
          : int(current.get(\"visibility\", \"0\")),\n                \"uvIndex\"\
          : int(current.get(\"uvIndex\", \"0\")),\n                \"pressure\": int(current.get(\"\
          pressure\", \"0\")),\n                \"cloudcover\": int(current.get(\"\
          cloudcover\", \"0\")),\n                \"obs_time\": current.get(\"localObsDateTime\"\
          , \"Unknown\")\n            }\n        }\n        return {\"result\": json.dumps(result)}\n\
          \    except Exception as e:\n        error_msg = \"Parse error: \" + str(e)\n\
          \        fallback = {\"city\": city, \"status\": \"error\", \"error\": error_msg}\n\
          \        return {\"result\": json.dumps(fallback)}"
